# ---------------------------------------------------------
# 服务器基础配置
# ---------------------------------------------------------
# 启动端口 (默认 8080)
server.port=8080
# 应用程序名称
spring.application.name=vps-ssh
# 如果使用容器环境，可以配置上下文路径
# server.servlet.context-path=/
# 登录会话超时时间（无操作后过期）
server.servlet.session.timeout=3h

# ---------------------------------------------------------
# 业务逻辑配置 (原有项)
# ---------------------------------------------------------
webssh.auth.username=admin
webssh.auth.password=admin123
webssh.session-store.directory=./data/sessions
webssh.crypto.master-key=change-this-master-key-in-production
# 仅当目标 SSH 服务器只支持 ssh-rsa 时再开启；默认关闭更安全
webssh.ssh.allow-legacy-ssh-rsa=true
# SSH keepalive（毫秒/次数），避免空闲连接被中间设备或服务器提前断开
webssh.ssh.server-alive-interval-ms=30000
webssh.ssh.server-alive-count-max=3

# ---------------------------------------------------------
# 资源治理配置
# ---------------------------------------------------------
# WebSocket shell 输出读取线程池：默认不排队，超过上限直接拒绝新连接的 shell 读取任务
webssh.resource.shell-output.core-size=4
webssh.resource.shell-output.max-size=128
webssh.resource.shell-output.queue-capacity=0
# Bot 普通命令线程池
webssh.resource.bot-command.core-size=2
webssh.resource.bot-command.max-size=16
webssh.resource.bot-command.queue-capacity=128
# AI 任务线程池
webssh.resource.ai-task.core-size=2
webssh.resource.ai-task.max-size=8
webssh.resource.ai-task.queue-capacity=32
# QQ 事件处理线程池
webssh.resource.qq-event.core-size=2
webssh.resource.qq-event.max-size=16
webssh.resource.qq-event.queue-capacity=128
# 每用户并发上限
webssh.resource.ws-shell-per-user=6
webssh.resource.bot-command-per-user=2
webssh.resource.ai-task-per-user=1
webssh.resource.qq-event-per-user=2
# 消息速率限制
webssh.resource.bot-message-rate-limit=8
webssh.resource.bot-message-rate-window=10s
webssh.resource.qq-message-rate-limit=6
webssh.resource.qq-message-rate-window=10s
# 任务总超时
webssh.resource.bot-command-timeout=30s
webssh.resource.ai-task-timeout=15m

# ---------------------------------------------------------
# 日志与性能优化 (可选)
# ---------------------------------------------------------
logging.level.root=info
logging.level.com.webssh=debug
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------------------------------------------------
# Tomcat & 连接调优
# ---------------------------------------------------------
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=4
server.tomcat.max-connections=400
server.tomcat.accept-count=100
server.tomcat.connection-timeout=10000

# ---------------------------------------------------------
# JVM 建议 (在启动脚本中设置)
# ---------------------------------------------------------
# 推荐 JVM 参数: -Xms128m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
# 生产环境建议: -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=./logs/
