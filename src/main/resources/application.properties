# ---------------------------------------------------------
# 服务器基础配置
# ---------------------------------------------------------
# 启动端口 (默认 8080)
server.port=8080
# 应用程序名称
spring.application.name=vps-ssh
# 如果使用容器环境，可以配置上下文路径
# server.servlet.context-path=/
# 登录会话超时时间（无操作后过期）
server.servlet.session.timeout=3h

# ---------------------------------------------------------
# 业务逻辑配置 (原有项)
# ---------------------------------------------------------
webssh.auth.username=admin
webssh.auth.password=admin123
webssh.session-store.directory=./data/sessions
webssh.crypto.master-key=change-this-master-key-in-production
# 仅当目标 SSH 服务器只支持 ssh-rsa 时再开启；默认关闭更安全
webssh.ssh.allow-legacy-ssh-rsa=true
# SSH keepalive（毫秒/次数），避免空闲连接被中间设备或服务器提前断开
# webssh.ssh.server-alive-interval-ms=30000
# webssh.ssh.server-alive-count-max=3

# ---------------------------------------------------------
# 日志与性能优化 (可选)
# ---------------------------------------------------------
logging.level.root=info
logging.level.com.webssh=debug
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------------------------------------------------
# Tomcat & 连接调优
# ---------------------------------------------------------
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=4
server.tomcat.max-connections=400
server.tomcat.accept-count=100
server.tomcat.connection-timeout=10000

# ---------------------------------------------------------
# JVM 建议 (在启动脚本中设置)
# ---------------------------------------------------------
# 推荐 JVM 参数: -Xms128m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
# 生产环境建议: -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=./logs/
